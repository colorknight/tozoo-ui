upstream member_api_backend {
    # member-api（与开发环境 vite 默认代理一致，按需改端口/地址）
    server 127.0.0.1:38172;
}

server {
    listen 80;
    # 改成你的域名，或暂不解析时用 _
    server_name tozoo.local;

    # 指向 npm run build 生成的 dist（务必是绝对路径）
    root /var/www/tozoo/dist;

    charset utf-8;

    # 单页应用：无前缀静态资源与路由回落
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 不写 VITE_API_BASE 时，前端请求 /member/...，由此反代到 member-api（同源免 CORS）
    location /member/ {
        proxy_pass http://member_api_backend/member/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态缓存（按需调整）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    access_log /var/log/nginx/tozoo.access.log;
    error_log /var/log/nginx/tozoo.error.log;
}